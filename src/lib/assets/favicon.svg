<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <title>CPO — Chidera Paul Ogbu</title>
  <!-- Background: dark circle matching site bg -->
  <rect width="64" height="64" rx="14" fill="#0a0e0c"/>
  <!-- Subtle teal ring -->
  <rect width="64" height="64" rx="14" fill="none" stroke="#216869" stroke-width="2" opacity="0.7"/>
  <!-- Initials: CPO — teal-to-sage gradient -->
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9cc5a1"/>
      <stop offset="100%" stop-color="#49a078"/>
    </linearGradient>
  </defs>
  <text
    x="32"
    y="43"
    text-anchor="middle"
    font-family="'Inter', 'DM Sans', system-ui, sans-serif"
    font-size="22"
